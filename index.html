<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Watch the dungeon live. Vote from the crowd. Dungeon Crawlers TV — coming soon.">
  <link rel="canonical" href="https://dungeoncrawlers.tv/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dungeoncrawlers.tv/">
  <meta property="og:title" content="Dungeon Crawlers TV | Watch the run. Steer the chaos.">
  <meta property="og:description" content="A live dungeon run you watch and steer from the crowd.">
  <meta property="og:image" content="https://dungeoncrawlers.tv/assets/og-cover.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dungeon Crawlers TV | Watch the run. Steer the chaos.">
  <meta name="twitter:description" content="A live dungeon run you watch and steer from the crowd.">
  <meta name="twitter:image" content="https://dungeoncrawlers.tv/assets/og-cover.svg">
  <title>Dungeon Crawlers TV | Watch the run. Steer the chaos.</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://www.makko.ai" crossorigin>
  <link rel="stylesheet" href="styles.css?v=20260619">
  <style>
    /* Critical layout — survives stale CDN/browser CSS cache */
    .hero { display: flex; flex-direction: column; align-items: center; }
    .tv-frame { width: min(96vw, 1120px); max-width: 1120px; margin: 0 auto; }
    .tv-screen { aspect-ratio: 16 / 9; border-radius: 10px; }
  </style>
</head>
<body>
  <a class="skip-link" href="#notify">Skip to signup</a>

  <header class="site-header">
    <a class="brand" href="/">
      <img src="assets/logo.svg" alt="" width="28" height="28">
      <span>Dungeon Crawlers TV</span>
    </a>
    <a class="btn btn--primary btn--sm" href="#notify">Notify me</a>
  </header>

  <main id="main">
    <section class="hero" aria-labelledby="hero-title">
      <div class="tv-hero">
        <div class="tv-frame">
          <div class="tv-cabinet">
            <div class="tv-bezel">
              <div class="tv-screen">
                <iframe
                  class="tv-game"
                  src="https://www.makko.ai/play/df07c779612f4338"
                  title="Dungeon Crawlers — live playtest"
                  allow="fullscreen; autoplay; gamepad"
                  loading="eager"
                  referrerpolicy="strict-origin-when-cross-origin"
                ></iframe>
                <div class="tv-scanlines" aria-hidden="true"></div>
                <div class="tv-badge" aria-hidden="true">
                  <span class="tv-badge__dot"></span>
                  LIVE
                </div>
              </div>
              <div class="tv-face" aria-hidden="true">
                <div class="tv-speaker"></div>
                <div class="tv-dials">
                  <span class="tv-dial"></span>
                  <span class="tv-dial"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="tv-stand">
            <span class="tv-stand__neck"></span>
            <span class="tv-stand__base"></span>
          </div>
        </div>
      </div>

      <div class="hero-foot">
        <p class="eyebrow">Coming soon</p>
        <h1 id="hero-title">Watch the run.<br>Steer the chaos.</h1>
        <p class="tagline">Stream the crawl. Vote from your browser.</p>

        <form class="notify-form" id="notify-form" aria-label="Launch notification signup">
          <label class="visually-hidden" for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email">
          <button class="btn btn--primary" type="submit">Join the list</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Dungeon Crawlers TV</p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    document.getElementById("notify-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      const subject = encodeURIComponent("Dungeon Crawlers TV launch list");
      const body = encodeURIComponent("Please add me to the launch list:\n\n" + email);
      window.location.href = "mailto:hello@dungeoncrawlers.tv?subject=" + subject + "&body=" + body;
    });
  </script>
</body>
</html>
